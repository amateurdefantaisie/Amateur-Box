<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amateur Box</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; margin:0; }

header { padding:20px; font-size:24px; background:#020617; }

.search {
  padding: 10px;
  width: 90%;
  margin: 20px auto;
  display:block;
  border-radius:5px;
  border:none;
}

.grid {
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:15px;
  padding:20px;
}

.card {
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

.card img, video { width:100%; }

.card-content { padding:10px; }

.actions {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

button {
  cursor:pointer;
  background:#334155;
  color:white;
  border:none;
  padding:5px 10px;
}

.comments {
  margin-top:10px;
  max-height:150px;
  overflow:auto;
  font-size:12px;
}

.load-more {
  display:block;
  margin:20px auto;
  padding:10px;
}
</style>
</head>

<body>

<header>📦 Amateur Box</header>

<input type="text" id="search" class="search" placeholder="🔍 Rechercher un manga...">

<div class="grid" id="grid"></div>

<button class="load-more" onclick="loadMore()">Voir plus</button>

<script>
let allPosts = [];
let visible = 20;

async function fetchPosts() {
  const res = await fetch("https://amateur-box-server.onrender.com/posts");
  allPosts = await res.json();
  displayPosts();
}

function displayPosts() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();

  allPosts
    .filter(p => p.text.toLowerCase().includes(search))
    .slice(0, visible)
    .forEach(post => {

      const card = document.createElement("div");
      card.className = "card";

      let media = post.photo ? `<img src="${post.photo}">` : "";
      if(post.video) media = `<video controls src="${post.video}"></video>`;

      card.innerHTML = `
        ${media}
        <div class="card-content">
          <p>${post.text}</p>

          <div class="actions">
            ❤️ <span>${post.likes}</span>
            <button onclick="like('${post.message_id}')">Like</button>
          </div>

          <input placeholder="Commenter..." 
                 onkeypress="if(event.key==='Enter') comment('${post.message_id}', this.value)">

          <div class="comments" id="c-${post.message_id}"></div>
        </div>
      `;

      grid.appendChild(card);
      loadComments(post.message_id);
    });
}

async function like(id) {
  await fetch(`https://amateur-box-server.onrender.com/like/${id}`, {method:"POST"});
  fetchPosts();
}

async function comment(id, text) {
  await fetch(`https://amateur-box-server.onrender.com/comment/${id}`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({text})
  });
  fetchPosts();
}

async function loadComments(id) {
  const res = await fetch(`https://amateur-box-server.onrender.com/comments/${id}`);
  const comments = await res.json();

  const div = document.getElementById("c-"+id);
  div.innerHTML = comments.map(c => `<p>💬 ${c.text}</p>`).join("");
}

function loadMore() {
  visible += 20;
  displayPosts();
}

document.getElementById("search").addEventListener("input", displayPosts);

fetchPosts();
</script>

</body>
</html>
